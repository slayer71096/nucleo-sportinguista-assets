<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Núcleo Sportinguista de Viseu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link
      rel="icon"
      type="image/png"
      href="https://raw.githubusercontent.com/slayer71096/nucleo-sportinguista-assets/main/icone-leao-192.png"
    />
    <link
      rel="apple-touch-icon"
      href="https://raw.githubusercontent.com/slayer71096/nucleo-sportinguista-assets/main/icone-leao-192.png"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Núcleo Sportinguista" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0C2B1B" />
    <link rel="manifest" id="app-manifest" href="manifest.json" />
    <style>
      :root {
        --bg: #0c2b1b;
        --bg-panel: #123822;
        --bg-panel-2: #1b4a2e;
        --line: #2c5c3c;
        --amber: #d9a83b;
        --amber-dim: #b0872a;
        --green: #3ed598;
        --red: #c1502e;
        --cream: #f4f7f2;
        --muted: #9fbba8;
        --radius: 14px;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        max-width: 100vw;
        touch-action: manipulation;
      }
      body {
        background: var(--bg);
        color: var(--cream);
        font-family: "Space Grotesk", sans-serif;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }
      .mono {
        font-family: "IBM Plex Mono", monospace;
      }
      button {
        font-family: inherit;
        cursor: pointer;
        border: none;
      }
      input {
        font-family: inherit;
      }

      #app {
        max-width: 900px;
        margin: 0 auto;
        padding: 0 0 90px;
        min-height: 100vh;
        overflow-x: hidden;
      }
      #app.staff-mode {
        max-width: 900px;
      }
      @media (min-width: 1180px) {
        #app.staff-mode {
          max-width: 1200px;
        }
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        background: linear-gradient(180deg, var(--bg) 70%, transparent);
        padding: 18px 18px 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .brand .mark {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: var(--amber);
        color: #0c2b1b;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 18px;
        flex: none;
      }
      .brand h1 {
        font-size: 18px;
        margin: 0;
        font-weight: 600;
        letter-spacing: 0.2px;
      }
      .brand span {
        display: block;
        font-size: 11px;
        color: var(--muted);
        margin-top: 1px;
      }
      .icon-btn {
        background: var(--bg-panel);
        color: var(--cream);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px 12px;
        font-size: 13px;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .icon-btn:active {
        transform: scale(0.97);
      }

      .landing {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 24px;
        text-align: center;
        gap: 28px;
      }
      .landing .mark-big {
        width: 76px;
        height: 76px;
        border-radius: 50%;
        background: var(--amber);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        box-shadow: 0 0 0 8px rgba(232, 163, 61, 0.12);
      }
      .landing h1 {
        font-size: 30px;
        margin: 0;
        font-weight: 700;
      }
      .landing p {
        color: var(--muted);
        margin: 0;
        max-width: 340px;
        font-size: 14px;
        line-height: 1.5;
      }

      .cats {
        display: flex;
        gap: 8px;
        padding: 4px 18px 14px;
        overflow-x: auto;
      }
      .cat-btn {
        background: var(--bg-panel);
        border: 1px solid var(--line);
        color: var(--muted);
        padding: 8px 16px;
        border-radius: 999px;
        font-size: 13.5px;
        font-weight: 500;
        white-space: nowrap;
      }
      .cat-btn.active {
        background: var(--amber);
        color: #0c2b1b;
        border-color: var(--amber);
        font-weight: 600;
      }

      .menu-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        padding: 0 18px;
      }
      @media (min-width: 560px) {
        .menu-grid {
          grid-template-columns: 1fr 1fr 1fr;
        }
      }
      .item-card {
        background: var(--bg-panel);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        justify-content: space-between;
        min-height: 108px;
      }
      .item-card b {
        font-size: 14.5px;
        line-height: 1.25;
      }
      .item-card .price {
        color: var(--amber);
        font-family: "IBM Plex Mono", monospace;
        font-size: 13px;
      }
      .qty-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .stepper {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .stepper button {
        width: 26px;
        height: 26px;
        border-radius: 8px;
        background: var(--bg-panel-2);
        color: var(--cream);
        font-size: 16px;
        line-height: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .stepper button:active {
        background: var(--amber);
        color: #0c2b1b;
      }
      .stepper .n {
        width: 18px;
        text-align: center;
        font-family: "IBM Plex Mono", monospace;
        font-size: 14px;
      }
      .add-btn {
        background: var(--amber);
        color: #0c2b1b;
        border-radius: 8px;
        padding: 6px 12px;
        font-size: 12.5px;
        font-weight: 700;
      }

      .cart-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 30;
        display: flex;
        justify-content: center;
        padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
        background: linear-gradient(0deg, var(--bg) 55%, transparent);
        pointer-events: none;
      }
      .cart-bar .inner {
        pointer-events: auto;
        width: 100%;
        max-width: 520px;
        background: var(--amber);
        color: #0c2b1b;
        border-radius: 14px;
        padding: 14px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        font-weight: 700;
      }
      .cart-bar .inner span.count {
        background: #0c2b1b;
        color: var(--amber);
        border-radius: 999px;
        padding: 2px 9px;
        font-size: 12px;
        margin-right: 8px;
        font-family: "IBM Plex Mono", monospace;
      }
      .cart-bar .total {
        font-family: "IBM Plex Mono", monospace;
      }

      .mesa-field {
        padding: 0 18px 14px;
      }
      .mesa-field label {
        font-size: 12px;
        color: var(--muted);
        display: block;
        margin-bottom: 6px;
      }
      .mesa-field input {
        width: 100%;
        background: var(--bg-panel);
        border: 1px solid var(--line);
        color: var(--cream);
        border-radius: 10px;
        padding: 12px 14px;
        font-size: 15px;
      }
      .mesa-field input:focus {
        outline: none;
        border-color: var(--amber-dim);
      }

      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        z-index: 50;
        display: flex;
        align-items: flex-end;
        justify-content: center;
      }
      @media (min-width: 560px) {
        .overlay {
          align-items: center;
        }
      }
      .sheet {
        background: var(--bg-panel);
        border: 1px solid var(--line);
        border-radius: 20px 20px 0 0;
        width: 100%;
        max-width: 480px;
        padding: 22px 20px calc(22px + env(safe-area-inset-bottom));
        max-height: 82vh;
        overflow-y: auto;
      }
      @media (min-width: 560px) {
        .sheet {
          border-radius: 20px;
        }
      }
      .sheet h2 {
        margin: 0 0 14px;
        font-size: 18px;
      }
      .sum-row {
        display: flex;
        justify-content: space-between;
        padding: 9px 0;
        border-bottom: 1px dashed var(--line);
        font-size: 14px;
      }
      .sum-row:last-of-type {
        border-bottom: none;
      }
      .sum-row .name {
        color: var(--cream);
      }
      .sum-row .p {
        font-family: "IBM Plex Mono", monospace;
        color: var(--muted);
      }
      .sum-total {
        display: flex;
        justify-content: space-between;
        padding-top: 14px;
        font-size: 16px;
        font-weight: 700;
      }
      .sum-total .v {
        font-family: "IBM Plex Mono", monospace;
        color: var(--amber);
      }
      .warning-box {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        margin-top: 10px;
        background: rgba(193, 80, 46, 0.22);
        border: 1px solid var(--red);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 13px;
        font-weight: 600;
        color: #ffdcc9;
      }
      .warning-box .icon {
        font-size: 15px;
        flex: none;
        line-height: 1.3;
      }
      .sheet-actions {
        display: flex;
        gap: 10px;
        margin-top: 18px;
      }
      .btn-secondary {
        flex: 1;
        background: var(--bg-panel-2);
        color: var(--cream);
        border-radius: 10px;
        padding: 13px;
        font-weight: 600;
        font-size: 14px;
      }
      .btn-primary {
        background: var(--amber);
        color: #0c2b1b;
        border-radius: 10px;
        padding: 13px;
        font-weight: 700;
        font-size: 14px;
        flex: none;
      }
      .btn-primary:disabled {
        opacity: 0.5;
      }
      .sheet-actions .btn-primary {
        flex: 2;
      }

      .confirm {
        text-align: center;
        padding: 50px 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }
      .confirm .stamp {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: var(--green);
        color: #0c2b1b;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 30px;
      }
      .confirm h2 {
        margin: 0;
        font-size: 20px;
      }
      .confirm p {
        color: var(--muted);
        margin: 0;
        font-size: 14px;
      }
      .ticket-id {
        font-family: "IBM Plex Mono", monospace;
        color: var(--amber);
        font-size: 13px;
        letter-spacing: 1px;
      }

      .my-orders {
        padding: 6px 18px 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .my-orders h3 {
        font-size: 13px;
        color: var(--muted);
        margin: 14px 0 2px;
        text-transform: uppercase;
        letter-spacing: 0.6px;
      }

      .staff-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 18px 8px;
        flex-wrap: wrap;
        gap: 10px;
      }
      .staff-toolbar small {
        color: var(--muted);
        font-size: 12px;
      }
      .empty-state {
        padding: 60px 24px;
        text-align: center;
        color: var(--muted);
      }
      .empty-state .e {
        font-size: 34px;
        margin-bottom: 10px;
      }

      .board {
        display: flex;
        gap: 14px;
        padding: 6px 18px 30px;
        align-items: flex-start;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      .board-col {
        flex: 1 1 260px;
        min-width: 260px;
        max-width: 420px;
        background: var(--bg-panel);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        display: flex;
        flex-direction: column;
        max-height: calc(100vh - 190px);
        min-height: 180px;
        border-top: 4px solid var(--line);
      }
      .board-col.col-novo {
        border-top-color: #e8845f;
      }
      .board-col.col-contas {
        border-top-color: var(--green);
      }
      .tab-total {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin: 10px 0 4px;
        font-size: 14px;
        font-weight: 700;
        color: var(--cream);
        border-top: 1px dashed var(--line);
        padding-top: 8px;
      }
      .tab-total span {
        color: var(--amber);
        font-family: "IBM Plex Mono", monospace;
      }
      .board-col-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        font-weight: 700;
        font-size: 15px;
        position: sticky;
        top: 0;
        background: var(--bg-panel);
        border-radius: 11px 11px 0 0;
        flex: none;
      }
      .board-count {
        background: var(--bg-panel-2);
        color: var(--cream);
        border-radius: 999px;
        padding: 2px 10px;
        font-size: 12.5px;
        font-family: "IBM Plex Mono", monospace;
      }
      .board-col-body {
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        overflow-y: auto;
        flex: 1;
      }
      .board-empty {
        color: var(--muted);
        font-size: 13px;
        text-align: center;
        padding: 24px 8px;
      }
      @media (max-width: 699px) {
        .board {
          flex-direction: column;
          overflow-x: visible;
        }
        .board-col {
          max-width: none;
          max-height: none;
        }
      }

      .ticket {
        background: var(--bg-panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 16px 16px 14px;
        position: relative;
        animation: slideIn 0.35s ease;
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .ticket-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 8px;
      }
      .mesa-tag {
        font-size: 20px;
        font-weight: 700;
        font-family: "IBM Plex Mono", monospace;
        color: var(--amber);
      }
      .member-name {
        font-size: 14.5px;
        font-weight: 600;
        color: var(--cream);
        margin-top: 2px;
      }
      .ticket-time {
        font-size: 11.5px;
        color: var(--muted);
        font-family: "IBM Plex Mono", monospace;
        white-space: nowrap;
        margin-top: 3px;
      }
      .ticket-items {
        font-family: "IBM Plex Mono", monospace;
        font-size: 13px;
        line-height: 1.7;
        color: var(--cream);
        margin: 8px 0 10px;
      }
      .ticket-items .qty {
        color: var(--amber-dim);
        margin-right: 6px;
      }
      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 11.5px;
        font-weight: 600;
        padding: 4px 10px;
        border-radius: 999px;
        letter-spacing: 0.3px;
        text-transform: uppercase;
      }
      .status-novo {
        background: rgba(193, 80, 46, 0.18);
        color: #e8845f;
      }
      .status-entregue {
        background: rgba(255, 255, 255, 0.06);
        color: var(--muted);
      }
      .status-pago {
        background: rgba(62, 213, 152, 0.18);
        color: var(--green);
      }
      .my-orders-total {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--bg-panel-2);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px 16px;
        margin-top: 4px;
        font-size: 14px;
        font-weight: 700;
        color: var(--cream);
      }
      .my-orders-total span {
        color: var(--amber);
        font-family: "IBM Plex Mono", monospace;
        font-size: 16px;
      }
      .ticket-foot {
        margin-top: 12px;
      }
      .advance-btn {
        width: 100%;
        background: var(--bg-panel-2);
        color: var(--cream);
        border-radius: 9px;
        padding: 12px;
        font-size: 13.5px;
        font-weight: 700;
      }
      .advance-btn:disabled {
        opacity: 0.55;
      }
      .advance-btn.ready {
        background: var(--amber);
        color: #0c2b1b;
      }
      .clear-btn {
        background: transparent;
        color: var(--muted);
        font-size: 12px;
        text-decoration: underline;
        padding: 4px;
      }

      .qr-panel {
        margin: 0 18px 20px;
        background: var(--bg-panel);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 14px 18px;
      }
      .qr-panel summary {
        cursor: pointer;
        font-size: 13.5px;
        font-weight: 600;
        color: var(--cream);
        list-style: none;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .qr-panel summary::-webkit-details-marker {
        display: none;
      }
      .qr-panel summary::before {
        content: "▸";
        color: var(--amber);
        font-size: 12px;
        transition: transform 0.15s;
      }
      .qr-panel[open] summary::before {
        transform: rotate(90deg);
      }
      .qr-panel[open] summary {
        margin-bottom: 12px;
      }
      .qr-panel p {
        color: var(--muted);
        font-size: 12.5px;
        margin: 0 0 10px;
        line-height: 1.5;
      }
      .qr-panel input {
        width: 100%;
        background: var(--bg-panel-2);
        border: 1px solid var(--line);
        color: var(--cream);
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 13px;
        margin-bottom: 10px;
      }
      #qrcode {
        display: flex;
        justify-content: center;
        padding: 10px;
        background: #fff;
        border-radius: 10px;
        width: fit-content;
        margin: 0 auto;
      }
      #qrcode img {
        display: block;
      }

      .loading-note {
        padding: 60px 24px;
        text-align: center;
        color: var(--muted);
      }

      ::-webkit-scrollbar {
        height: 6px;
        width: 6px;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--line);
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <div id="app"><div class="loading-note">A carregar…</div></div>

    <script>
      /* MENU vem agora do separador "Produtos" da Google Sheet, carregado no arranque */
      let MENU = {};

      const STATUS_ORDER = ["novo", "entregue", "pago"];
      const STATUS_LABEL = { novo: "Novo", entregue: "Entregue", pago: "Pago" };
      const MEMBER_STATUS_LABEL = {
        novo: "Por entregar",
        entregue: "Por pagar",
        pago: "Pago",
      };

      // Endereço da tua Web App do Apps Script (o link que termina em /exec).
      // É só a "base de dados" agora — já não mostra a app se abrires diretamente.
      const API_BASE =
        "https://script.google.com/macros/s/AKfycbyujWE0xxNi4HyV7uOt9J4ob2_67HI34aBznkyPIFL5ZU67_K_aBe4i7DZAw2dRJDXy/exec";

      // Link do balcão: abrir esta app com ?balcao=1 no fim do URL dá acesso direto
      // à vista de pedidos, sem passar pela autenticação de sócio.
      const isStaffLink =
        new URLSearchParams(window.location.search).get("balcao") === "1";

      // O manifest.json estático não sabe se isto é o link do balcão ou dos sócios.
      // Substituímo-lo por um gerado na hora, com o URL exato desta página como
      // start_url — assim o ícone instalado abre sempre no sítio certo.
      (function setupManifest() {
        try {
          const manifest = {
            name: isStaffLink
              ? "Núcleo Sportinguista — Balcão"
              : "Núcleo Sportinguista de Viseu",
            short_name: isStaffLink ? "Balcão" : "Núcleo Sportinguista",
            start_url: window.location.href,
            id: window.location.href,
            display: "standalone",
            background_color: "#0C2B1B",
            theme_color: "#0C2B1B",
            icons: [
              {
                src: "https://raw.githubusercontent.com/slayer71096/nucleo-sportinguista-assets/main/icone-leao-192.png",
                sizes: "192x192",
                type: "image/png",
              },
              {
                src: "https://raw.githubusercontent.com/slayer71096/nucleo-sportinguista-assets/main/icone-leao-512.png",
                sizes: "512x512",
                type: "image/png",
              },
            ],
          };
          const blob = new Blob([JSON.stringify(manifest)], {
            type: "application/manifest+json",
          });
          document.getElementById("app-manifest").href =
            URL.createObjectURL(blob);
        } catch (e) {
          console.error("Erro a configurar manifest", e);
        }
      })();

      let authenticated = false;
      let phone = "";
      let memberName = "";
      let authError = "";
      let checkingAuth = false;
      let activeCat = "";
      let cart = {};
      let mesa = "";
      let pollTimer = null;
      let showSummary = false;
      let staffLink = "";
      let qrPanelOpen = false;
      let lastStaffSnapshot = "";

      const app = document.getElementById("app");
      if (isStaffLink) app.classList.add("staff-mode");

      /* ---------- ligação à API (Google Apps Script como backend) ---------- */
      async function apiGet(action, params) {
        const url = new URL(API_BASE);
        url.searchParams.set("action", action);
        if (params)
          Object.entries(params).forEach(([k, v]) =>
            url.searchParams.set(k, v),
          );
        const res = await fetch(url.toString());
        return res.json();
      }
      async function apiPost(action, payload) {
        // Content-Type 'text/plain' evita o pre-flight CORS que o Apps Script não sabe responder.
        const res = await fetch(API_BASE, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({ action, ...payload }),
        });
        return res.json();
      }

      function euros(n) {
        return n.toFixed(2).replace(".", ",") + " 🦁";
      }
      function uid() {
        return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
      }
      function normalizePhone(p) {
        return (p || "").replace(/\D/g, "");
      }

      async function loadMenu() {
        try {
          MENU = await apiGet("getMenu");
          if (!MENU[activeCat]) activeCat = Object.keys(MENU)[0] || "";
        } catch (e) {
          MENU = {};
          console.error("Erro a carregar menu", e);
        }
      }

      async function loadOrders() {
        try {
          return await apiGet("getOrders");
        } catch (e) {
          console.error("Erro a carregar pedidos", e);
          return [];
        }
      }
      async function addOrder(order) {
        try {
          await apiPost("addOrder", { order });
        } catch (e) {
          console.error("Erro a guardar pedido", e);
        }
      }
      async function advanceStatus(id) {
        const list = await loadOrders();
        const idx = list.findIndex((o) => o.id === id);
        if (idx === -1) return;
        const next = STATUS_ORDER[STATUS_ORDER.indexOf(list[idx].status) + 1];
        if (!next) return;
        try {
          await apiPost("updateOrderStatus", { id, status: next });
        } catch (e) {
          console.error("Erro a avançar estado", e);
        }
        render();
      }
      async function markPaid(phone) {
        try {
          await apiPost("markMemberPaid", { phone });
        } catch (e) {
          console.error("Erro a marcar como pago", e);
        }
        render();
      }

      function timeAgo(ts) {
        const mins = Math.floor((Date.now() - ts) / 60000);
        if (mins < 1) return "agora";
        if (mins === 1) return "1 min";
        return mins + " min";
      }

      function cartCount() {
        return Object.values(cart).reduce((a, b) => a + b, 0);
      }
      function cartTotal() {
        let t = 0;
        const allItems = Object.values(MENU).flat();
        for (const [id, qty] of Object.entries(cart)) {
          const it = allItems.find((i) => i.id === id);
          if (it) t += it.price * qty;
        }
        return t;
      }
      function setQty(id, delta) {
        const q = (cart[id] || 0) + delta;
        if (q <= 0) delete cart[id];
        else cart[id] = q;
        render();
      }

      function startPolling() {
        if (pollTimer) clearInterval(pollTimer);
        pollTimer = setInterval(render, 4000);
      }
      function stopPolling() {
        if (pollTimer) clearInterval(pollTimer);
        pollTimer = null;
      }
      let myOrdersTimer = null;
      function startMyOrdersPolling() {
        if (myOrdersTimer) clearInterval(myOrdersTimer);
        myOrdersTimer = setInterval(renderMyOrders, 4000);
      }
      function stopMyOrdersPolling() {
        if (myOrdersTimer) clearInterval(myOrdersTimer);
        myOrdersTimer = null;
      }

      async function render() {
        if (isStaffLink) {
          await renderStaff();
          return;
        }
        if (!authenticated) {
          renderPhoneAuth();
          return;
        }
        await renderCliente();
      }

      async function tryAuth() {
        checkingAuth = true;
        renderPhoneAuth();
        const clean = normalizePhone(phone);
        let result = { found: false };
        try {
          result = await apiGet("checkMember", { phone: clean });
        } catch (e) {
          console.error("Erro a verificar sócio", e);
        }
        checkingAuth = false;
        if (!clean || !result.found) {
          authError =
            "Número não reconhecido. Confirma o número ou fala com o balcão.";
          renderPhoneAuth();
          return;
        }
        authError = "";
        memberName = result.name;
        authenticated = true;
        render();
      }

      function renderPhoneAuth() {
        stopPolling();
        stopMyOrdersPolling();
        lastMyOrdersSnapshot = "";
        app.innerHTML = `
    <div class="landing">
      <div class="mark-big">🦁</div>
      <div>
        <h1>Núcleo Sportinguista de Viseu</h1>
        <p>Introduz o teu número de telemóvel de sócio para fazeres o teu pedido.</p>
      </div>
      <div class="mesa-field" style="width:100%;max-width:300px;padding:0;">
        <label>Número de telemóvel</label>
        <input id="phone-input" inputmode="tel" placeholder="ex: 912 345 678" value="${phone}">
      </div>
      ${authError ? `<div class="warning-box" style="max-width:300px;"><span class="icon">⚠️</span><span>${authError}</span></div>` : ""}
      <button class="btn-primary" id="phone-submit" style="width:100%;max-width:300px;padding:15px 30px;" ${checkingAuth ? "disabled" : ""}>${checkingAuth ? "A verificar..." : "Entrar"}</button>
    </div>
  `;
        const input = document.getElementById("phone-input");
        input.oninput = (e) => {
          phone = e.target.value;
        };
        input.onkeydown = (e) => {
          if (e.key === "Enter") tryAuth();
        };
        document.getElementById("phone-submit").onclick = tryAuth;
      }

      async function renderCliente() {
        if (showSummary) {
          renderSummarySheet();
          return;
        }
        stopPolling();
        const items = MENU[activeCat] || [];
        app.innerHTML = `
    <div class="topbar">
      <div class="brand">
        <div class="mark">🦁</div>
        <div><h1>Núcleo Sportinguista de Viseu</h1><span>Olá, ${memberName}</span></div>
      </div>
      <button class="icon-btn" id="back-btn">← Sair</button>
    </div>
    <div class="mesa-field">
      <label>Número da mesa</label>
      <input id="mesa-input" inputmode="numeric" placeholder="ex: 7" value="${mesa}">
    </div>
    <div class="cats">
      ${Object.keys(MENU)
        .map(
          (c) =>
            `<button class="cat-btn ${c === activeCat ? "active" : ""}" data-cat="${c}">${c}</button>`,
        )
        .join("")}
    </div>
    <div class="menu-grid">
      ${items
        .map(
          (it) => `
        <div class="item-card">
          <div><b>${it.name}</b><div class="price">${euros(it.price)}</div></div>
          <div class="qty-row">
            ${
              cart[it.id]
                ? `
              <div class="stepper">
                <button data-minus="${it.id}">−</button>
                <span class="n">${cart[it.id]}</span>
                <button data-plus="${it.id}">+</button>
              </div>
            `
                : `<button class="add-btn" data-plus="${it.id}">Adicionar</button>`
            }
          </div>
        </div>
      `,
        )
        .join("")}
    </div>
    ${
      cartCount() > 0
        ? `
      <div class="cart-bar">
        <div class="inner" id="cart-cta">
          <span><span class="count">${cartCount()}</span>Ver pedido</span>
          <span class="total">${euros(cartTotal())}</span>
        </div>
      </div>
    `
        : ""
    }
  `;
        document.getElementById("back-btn").onclick = () => {
          authenticated = false;
          phone = "";
          memberName = "";
          mesa = "";
          cart = {};
          render();
        };
        document.getElementById("mesa-input").oninput = (e) => {
          mesa = e.target.value;
        };
        document.querySelectorAll("[data-cat]").forEach(
          (b) =>
            (b.onclick = () => {
              activeCat = b.dataset.cat;
              render();
            }),
        );
        document
          .querySelectorAll("[data-plus]")
          .forEach((b) => (b.onclick = () => setQty(b.dataset.plus, 1)));
        document
          .querySelectorAll("[data-minus]")
          .forEach((b) => (b.onclick = () => setQty(b.dataset.minus, -1)));
        const cta = document.getElementById("cart-cta");
        if (cta)
          cta.onclick = () => {
            showSummary = true;
            render();
          };
        const activeCatBtn = document.querySelector(".cat-btn.active");
        if (activeCatBtn)
          activeCatBtn.scrollIntoView({ inline: "center", block: "nearest" });

        renderMyOrders();
        startMyOrdersPolling();
      }

      let lastMyOrdersSnapshot = "";
      async function renderMyOrders() {
        if (!authenticated) return;
        const list = await loadOrders();
        const myPhone = normalizePhone(phone);
        const mine = list
          .filter((o) => o.phone === myPhone && o.status !== "pago")
          .sort((a, b) => b.ts - a.ts);
        const existing = document.getElementById("my-orders-section");
        if (mine.length === 0) {
          if (existing) existing.remove();
          lastMyOrdersSnapshot = "";
          return;
        }
        const snapshot = JSON.stringify(mine.map((o) => o.id + ":" + o.status));
        if (snapshot === lastMyOrdersSnapshot && existing) return;
        lastMyOrdersSnapshot = snapshot;
        const grandTotal = mine.reduce((sum, o) => sum + o.total, 0);
        const html =
          `<h3>Os teus pedidos</h3>` +
          mine
            .map(
              (o) => `
    <div class="ticket">
      <div class="ticket-head">
        <span class="mesa-tag" style="font-size:14px;">Mesa ${o.mesa}</span>
        <span class="status-pill status-${o.status}">${MEMBER_STATUS_LABEL[o.status]}</span>
      </div>
      <div class="ticket-items">${o.items.map((i) => `<div><span class="qty">${i.qty}×</span>${i.name}</div>`).join("")}</div>
      <div class="tab-total"><span>${euros(o.total)}</span></div>
    </div>
  `,
            )
            .join("") +
          `<div class="my-orders-total">Total por pagar <span>${euros(grandTotal)}</span></div>`;
        if (existing) {
          existing.innerHTML = html;
        } else {
          const el = document.createElement("div");
          el.id = "my-orders-section";
          el.className = "my-orders";
          el.innerHTML = html;
          app.appendChild(el);
        }
      }

      function renderSummarySheet() {
        const allItems = Object.values(MENU).flat();
        const lines = Object.entries(cart).map(([id, qty]) => {
          const it = allItems.find((i) => i.id === id);
          return { ...it, qty };
        });
        app.innerHTML = `
    <div class="overlay">
      <div class="sheet">
        <h2>Confirmar pedido — Mesa ${mesa || "?"}</h2>
        ${lines
          .map(
            (l) => `
          <div class="sum-row">
            <span class="name">${l.qty}× ${l.name}</span>
            <span class="p">${euros(l.price * l.qty)}</span>
          </div>
        `,
          )
          .join("")}
        <div class="sum-total"><span>Total</span><span class="v">${euros(cartTotal())}</span></div>
        <div class="sheet-actions">
          <button class="btn-secondary" id="cancel-btn">Voltar</button>
          <button class="btn-primary" id="confirm-btn" ${!mesa ? 'disabled title="Indica a mesa"' : ""}>Enviar pedido</button>
        </div>
        ${!mesa ? '<div class="warning-box"><span class="icon">⚠️</span><span>Indica o número da mesa antes de enviar.</span></div>' : ""}
      </div>
    </div>
  `;
        document.getElementById("cancel-btn").onclick = () => {
          showSummary = false;
          render();
        };
        document.getElementById("confirm-btn").onclick = async () => {
          if (!mesa) return;
          const btn = document.getElementById("confirm-btn");
          btn.disabled = true;
          btn.textContent = "A enviar...";
          const order = {
            id: uid(),
            mesa: mesa,
            phone: normalizePhone(phone),
            memberName: memberName,
            items: lines.map((l) => ({
              name: l.name,
              qty: l.qty,
              price: l.price,
            })),
            total: cartTotal(),
            status: "novo",
            ts: Date.now(),
          };
          await addOrder(order);
          cart = {};
          showSummary = false;
          renderConfirm(order);
        };
      }

      function renderConfirm(order) {
        app.innerHTML = `
    <div class="confirm">
      <div class="stamp">✓</div>
      <h2>Pedido enviado!</h2>
      <p>Mesa ${order.mesa} · total ${euros(order.total)}</p>
      <span class="ticket-id">#${order.id.slice(-5)}</span>
      <button class="btn-primary" id="new-order-btn" style="margin-top:18px;width:100%;max-width:300px;padding:14px 24px;">Fazer outro pedido</button>
    </div>
  `;
        document.getElementById("new-order-btn").onclick = () => {
          render();
        };
        startPolling();
      }

      async function renderStaff() {
        const list = await loadOrders();
        const snapshot = JSON.stringify(
          list.map((o) => o.id + ":" + o.status).sort(),
        );
        if (snapshot === lastStaffSnapshot) {
          return;
        } // nada mudou, não mexer no ecrã
        lastStaffSnapshot = snapshot;

        const pending = list
          .filter((o) => o.status === "novo")
          .sort((a, b) => a.ts - b.ts);
        const openOrders = list.filter(
          (o) => o.status !== "novo" && o.status !== "pago",
        );

        // Agrupar contas em aberto por sócio (telemóvel identifica de forma única)
        const tabsMap = {};
        openOrders
          .sort((a, b) => a.ts - b.ts)
          .forEach((o) => {
            const key = o.phone || o.memberName || "sem-nome";
            if (!tabsMap[key])
              tabsMap[key] = {
                phone: o.phone,
                name: o.memberName || "Sócio",
                lines: [],
                total: 0,
              };
            o.items.forEach((i) => {
              tabsMap[key].lines.push(i);
              tabsMap[key].total += i.price * i.qty;
            });
          });
        const tabs = Object.values(tabsMap);

        const pendingTicketHtml = (o) => `
    <div class="ticket">
      <div class="ticket-head">
        <div>
          <span class="mesa-tag">Mesa ${o.mesa}</span>
          ${o.memberName ? `<div class="member-name">${o.memberName}</div>` : ""}
        </div>
      </div>
      <div class="ticket-items">${o.items.map((i) => `<div><span class="qty">${i.qty}×</span>${i.name}</div>`).join("")}</div>
      <div class="ticket-foot">
        <button class="advance-btn" data-advance="${o.id}">Entregue →</button>
      </div>
    </div>
  `;

        const tabHtml = (t) => `
    <div class="ticket">
      <div class="ticket-head">
        <div class="member-name" style="font-size:16px;">${t.name}</div>
      </div>
      <div class="ticket-items">${t.lines.map((i) => `<div style="display:flex;justify-content:space-between;"><span><span class="qty">${i.qty}×</span>${i.name}</span><span class="mono">${euros(i.price)}</span></div>`).join("")}</div>
      <div class="tab-total">Total: <span>${euros(t.total)}</span></div>
      <div class="ticket-foot">
        <button class="advance-btn ready" data-paid="${t.phone}">✓ Pago</button>
      </div>
    </div>
  `;

        app.innerHTML = `
    <div class="topbar">
      <div class="brand">
        <div class="mark">🧾</div>
        <div><h1>Núcleo Sportinguista de Viseu</h1><span>Pedidos por atender · ${pending.length}</span></div>
      </div>
    </div>
    <div class="staff-toolbar">
      <small>Atualiza automaticamente a cada 4s · dados na Google Sheet</small>
    </div>
    <details class="qr-panel" id="qr-details" ${qrPanelOpen ? "open" : ""}>
      <summary>📎 Configurar link/QR code para os sócios (mesas)</summary>
      <p>Cola aqui o link desta app <b>sem</b> "?balcao=1" no fim, para gerar o QR code a colocar nas mesas. Para voltares a esta vista de balcão, adiciona <span class="mono">?balcao=1</span> ao fim do link.</p>
      <input id="link-input" placeholder="https://script.google.com/macros/s/.../exec" value="${staffLink}">
      <div id="qrcode"></div>
    </details>
    ${
      list.length === 0
        ? `
      <div class="empty-state"><div class="e">🫙</div>Ainda não há pedidos.</div>
    `
        : `
      <div class="board">
        <div class="board-col col-novo">
          <div class="board-col-head">
            <span>Pedidos</span>
            <span class="board-count">${pending.length}</span>
          </div>
          <div class="board-col-body">
            ${pending.length ? pending.map(pendingTicketHtml).join("") : `<div class="board-empty">Sem pedidos</div>`}
          </div>
        </div>
        <div class="board-col col-contas">
          <div class="board-col-head">
            <span>Contas em Aberto</span>
            <span class="board-count">${tabs.length}</span>
          </div>
          <div class="board-col-body">
            ${tabs.length ? tabs.map(tabHtml).join("") : `<div class="board-empty">Sem contas em aberto</div>`}
          </div>
        </div>
      </div>
    `
    }
  `;
        document.querySelectorAll("[data-advance]").forEach(
          (b) =>
            (b.onclick = () => {
              if (b.disabled) return;
              b.disabled = true;
              b.textContent = "A atualizar...";
              advanceStatus(b.dataset.advance);
            }),
        );
        document.querySelectorAll("[data-paid]").forEach(
          (b) =>
            (b.onclick = () => {
              if (b.disabled) return;
              b.disabled = true;
              b.textContent = "A fechar conta...";
              markPaid(b.dataset.paid);
            }),
        );

        const linkInput = document.getElementById("link-input");
        linkInput.oninput = () => {
          staffLink = linkInput.value;
          drawQR(staffLink);
        };
        drawQR(staffLink || "");
        document
          .getElementById("qr-details")
          .addEventListener("toggle", (e) => {
            qrPanelOpen = e.target.open;
          });

        startPolling();
      }

      function drawQR(text) {
        const holder = document.getElementById("qrcode");
        if (!holder) return;
        holder.innerHTML = "";
        if (!text) {
          holder.style.display = "none";
          return;
        }
        holder.style.display = "flex";
        try {
          new QRCode(holder, {
            text,
            width: 150,
            height: 150,
            colorDark: "#0C2B1B",
            colorLight: "#ffffff",
          });
        } catch (e) {
          console.error(e);
        }
      }

      (async function init() {
        await loadMenu();
        render();
      })();
    </script>
  </body>
</html>
